<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            position: relative;
            height: 100%;
            overflow: hidden;
        }
        .card_container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fbe9e7;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            position: relative;
            width: 300px;
            height: 400px;
            background: #fefefe;
            transform-style: preserve-3d;
            transform: perspective(1000px);
            box-shadow: 10px 20px 40px rgba(0, 0, 0, 0.2);
            transition: 1s;
        }
        .card:hover {
            transform: translateX(50%);
        }
        .card .imgBox {
            position: relative;
            width: 100%;
            height: 100%;
            transform-origin: left;
            transform-style: preserve-3d;
            background: #000;
            transition: 1s;
            z-index: 1;
            box-shadow: 10px 20px 40px rgba(0, 0, 0, 0.2);
        }
        .card:hover .imgBox {
            transform: rotateY(-180deg);
        }
        .card .imgBox img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
        .card .imgBox img:nth-child(2) {
            transform: rotateY(180deg);
        }
        .card .details {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card .details .content {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .card .details .content span {
            position: relative;
            font-family: sans-serif;
        }
        .card .details .content .chinese_name {
            color: #000;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .card .details .content .english_name {
            color: #000;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .card .details .content .job {
            color: #e21212;
            font-size: 16px;
            font-weight: 500;
        }
        .card .details .content .social_icons {
            position: relative;
            margin-top: 10px;
            display: flex;
            flex-direction: row;
        }
        .card .details .content .social_icons svg {
            position: relative;
            padding: 4px;
            margin: 4px;
            width: 36px;
            height: 36px;
            fill: #fefefe;
            background: #333333;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        .card .details .content .social_icons svg:hover {
            background: #e21212;
        }
    </style>
</head>
<body>
