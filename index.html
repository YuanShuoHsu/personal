<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/Poppins.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            position: relative;
            height: 100%;
            overflow: hidden;
        }

        .card_container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 211, 219, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card_container::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(254, 254, 254, 0.8);
            background: rgba(254, 254, 254, 0.5);
            transform: rotate(45deg);
        }

        .card {
            position: relative;
            width: 300px;
            height: 400px;
            background: #ffffff;
            border-radius: 0 10px 10px 0;
            transform-style: preserve-3d;
            transform: perspective(1000px);
            transition: 1s;
        }

        .card.active {
            transform: translateX(50%);
        }

        .card .imgBox {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 0 10px 10px 0;
            transform-style: preserve-3d;
            transform-origin: left;
            transition: 1s;
            z-index: 1;
            overflow: hidden;
        }

        .card.active .imgBox {
            transform: rotateY(-180deg);
            box-shadow: 10px 20px 40px rgba(0, 0, 0, 0.2);
        }

        .card .imgBox .glass {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            transition: 1s;
        }

        .card.active .imgBox .glass {
            z-index: 0;
        }

        .card .imgBox .glass .open {
            position: relative;
            width: 120px;
            height: 40px;
            background: rgba(254, 254, 254, 0.2);
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            border-top: 1px solid rgba(254, 254, 254, 0.8);
            border-left: 1px solid rgba(254, 254, 254, 0.8);
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            color: rgba(45, 74, 82, 0.8);
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            transition: 0.5s;
            transform: translateY(20px);
            opacity: 0;
        }

        .card:hover .imgBox .glass .open {
            transform: translateY(0);
            opacity: 1;
        }

        .card .imgBox img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            user-select: none;
        }

        .card .imgBox img:nth-child(2) {
            transform: rotateY(180deg);
        }

        .card .details {
            position: absolute;
            padding: 20px;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 0 10px 10px 0;
            box-shadow: 10px 20px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card .details .line {
            position: absolute;
            left: calc(-50% + 2px);
            top: 50%;
            width: 100%;
            height: 4px;
            transform: rotate(90deg);
            background: linear-gradient(90deg, #000 0%, #000 50%, transparent 50%, transparent 100%);
            background-size: 40px;
        }

        .card .details .content {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .card.active .details .content {
            animation: to-top 1s forwards;
        }

        @keyframes to-top {
            0% {
                transform: translateY(20%);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .card .details .content .greet {
            position: relative;
            width: 200px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 1px;
            color: #000000;
            user-select: none;
        }

        .card .details .content img {
            position: relative;
            margin: 8px 0;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            user-select: none;
        }

        .card .details .content .englishName {
            position: relative;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 1px;
            color: #000000;
            user-select: none;
        }

        .card .details .content .job {
            position: relative;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: rgba(218, 112, 115);
            text-decoration: underline;
            user-select: none;
        }

        .card .details .content .cv {
            position: relative;
            margin: 8px 0;
            padding: 12px 24px;
            border: 1px solid rgba(83, 112, 114, 0.2);
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
            text-decoration: none;
            color: rgba(83, 112, 114, 0.8);
            background: rgba(243, 234, 219, 1);
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            transition: 0.2s;
        }

        .card .details .content .cv:hover {
            background: rgba(243, 234, 219, 0.8);
        }

        .card .details .content .mobile {
            position: relative;
            width: 200px;
            display: flex;
            align-items: center;
        }

        .card .details .content .mobile svg {
            position: relative;
            margin: 8px;
            width: 24px;
            height: 24px;
            fill: #8e9b97;
        }

        .card .details .content .mobile span {
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 100;
            letter-spacing: 1px;
            color: #000000;
        }

        .card .details .content .mail {
            position: relative;
            width: 200px;
            display: flex;
            align-items: center;
        }

        .card .details .content .mail svg {
            position: relative;
            margin: 8px;
            width: 24px;
            height: 24px;
            fill: #8e9b97;
        }

        .card .details .content .mail span {
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 100;
            letter-spacing: 1px;
            color: #000000;
        }

        @media (max-width: 768px) {
            .card.active .imgBox {
                opacity: 0;
            }

            .card.active {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>
    <section class="card_container">
        <div class="card">
            <div class="imgBox">
                <div class="glass">
                    <span class="open">click</span>
                </div>
                <img src="./picture/resume.png" alt="">
                <img src="./picture/resume.png" alt="">
            </div>
            <div class="details">
                <span class="line"></span>
                <div class="content">
                    <span class="greet">Hi, I am</span>
                    <img src="./picture/doge.jpg" alt="">
                    <span class="englishName">Yuan Shuo Hsu</span>
                    <span class="job">Front-end developer</span>
                    <a href="" class="cv">Download My CV</a>
                    <div class="mobile">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                            <path
                                d="M304 0h-224c-35.35 0-64 28.65-64 64v384c0 35.35 28.65 64 64 64h224c35.35 0 64-28.65 64-64V64C368 28.65 339.3 0 304 0zM192 480c-17.75 0-32-14.25-32-32s14.25-32 32-32s32 14.25 32 32S209.8 480 192 480zM304 64v320h-224V64H304z" />
                        </svg>
                        <span>0981-140-688</span>
                    </div>
                    <div class="mail">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path
                                d="M464 64C490.5 64 512 85.49 512 112C512 127.1 504.9 141.3 492.8 150.4L275.2 313.6C263.8 322.1 248.2 322.1 236.8 313.6L19.2 150.4C7.113 141.3 0 127.1 0 112C0 85.49 21.49 64 48 64H464zM217.6 339.2C240.4 356.3 271.6 356.3 294.4 339.2L512 176V384C512 419.3 483.3 448 448 448H64C28.65 448 0 419.3 0 384V176L217.6 339.2z" />
                        </svg>
                        <span>ook1725@gmail.com</span>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script>
        let card = document.querySelector(".card");
        let card_container = document.querySelector(".card_container");
        card.onclick = (e) => {
            e.stopPropagation();
            card.classList.add("active");
        };
        card_container.onclick = (e) => {
            card.classList.remove("active");
        };
    </script>
</body>

</html>
